<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Examen - Gestion des Opérations I</title>
    <style>
        :root { --primary: #1e3a8a; --bg: #f1f5f9; --text: #0f172a; --card-bg: #ffffff; --correct: #16a34a; --incorrect: #dc2626; --border: #cbd5e1; }
        body { font-family: sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .app-container { background: var(--card-bg); width: 100%; max-width: 800px; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; }
        .question-text { font-size: 1.2rem; margin: 2rem 0; font-weight: bold; }
        .options-container { display: flex; flex-direction: column; gap: 10px; }
        button.option-btn { padding: 15px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; text-align: left; font-size: 1rem; }
        button.option-btn:hover { background: #eff6ff; }
        button.correct { background: var(--correct) !important; color: white; }
        button.incorrect { background: var(--incorrect) !important; color: white; }
        #next-btn { margin-top: 20px; padding: 10px 20px; display: none; width: 100%; background: var(--primary); color: white; border: none; cursor: pointer; }
    </style>
</head>
